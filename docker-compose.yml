services:
  neuraself:
    build: .
    container_name: neuraself
    restart: unless-stopped
    ports:
      - "8000:8000"          # dashboard at http://localhost:8000
    volumes:
      - ./config:/app/config # accounts.json, settings, auth, per-account settings_<id>.json
      - ./data:/app/data     # stats / history persistence
    environment:
      - NEURA_AUTOSTART=1     # skip the interactive menu, start all enabled accounts
      - NEURA_SKIP_DEP_CHECK=1

  control-bot:
    build:
      context: .
      dockerfile: control_bot/Dockerfile
    container_name: neuraself-control-bot
    restart: unless-stopped
    depends_on:
      - neuraself
    volumes:
      - ./config:/app/config:ro   # read-only: accounts.json (autocomplete) + auth.json (control_api_token)
    environment:
      - CONTROL_BOT_TOKEN=${CONTROL_BOT_TOKEN:?set your Discord bot token in .env}
      - DASHBOARD_URL=http://neuraself:8000       # internal docker network, not the public VPS URL

  cdp-solver:
    build:
      context: .
      dockerfile: cdp_solver/Dockerfile
    container_name: neuraself-cdp-solver
    restart: unless-stopped
    # Real Chrome + Xvfb per solve — heavy (CPU/RAM), unproven in production yet.
    # Only neuraself needs to reach it (internal network); not exposed publicly.
    shm_size: "2gb"   # Chrome is prone to crashing on the default 64MB /dev/shm
    expose:
      - "8100"
